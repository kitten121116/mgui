<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免责声明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .warning-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .disclaimer-content {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            line-height: 1.8;
            color: #555;
        }

        .disclaimer-content p {
            margin-bottom: 15px;
            text-align: justify;
        }

        .disclaimer-content p:last-child {
            margin-bottom: 0;
        }

        .disclaimer-content strong {
            color: #e65100;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .checkbox-container:hover {
            background: #e9ecef;
        }

        .checkbox-container input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-container label {
            flex: 1;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }

        .esc-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9em;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
        }

        .esc-hint kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 警告图标 -->
        <div class="warning-icon">⚠️</div>
        
        <!-- 标题 -->
        <h1>免责声明</h1>
        
        <!-- 免责声明内容 -->
        <div class="disclaimer-content">
            <p><strong>重要提示：</strong>本程序仅供学习和研究目的使用。</p>
            <p>使用本程序即表示您同意以下条款：</p>
            <p>1. <strong>责任免除：</strong>开发者不对因使用本程序造成的任何直接或间接损失负责。</p>
            <p>2. <strong>合规使用：</strong>您必须确保使用本程序符合所在地区的法律法规。</p>
            <p>3. <strong>风险自担：</strong>使用本程序存在一定风险，您需自行承担所有后果。</p>
            <p>4. <strong>版权声明：</strong>本程序受版权保护，未经授权不得用于商业用途。</p>
        </div>
        
        <!-- 同意复选框 -->
        <div class="checkbox-container">
            <input type="checkbox" id="agreeCheckbox">
            <label for="agreeCheckbox">我已阅读并同意上述免责声明</label>
        </div>
        
        <!-- 下一步按钮 -->
        <button class="btn btn-primary" id="nextBtn" disabled onclick="closeTab()">
            下一步 →
        </button>
        
        <!-- 页脚 -->
        <div class="footer">
            MGUI Integration v2.0.0
        </div>
    </div>
    
    <!-- ESC 关闭提示 -->
    <div class="esc-hint">
        <span>按</span>
        <kbd>ESC</kbd>
        <span>关闭界面</span>
    </div>

    <script>
        // 获取元素
        const checkbox = document.getElementById('agreeCheckbox');
        const nextBtn = document.getElementById('nextBtn');
        
        // 监听复选框变化
        checkbox.addEventListener('change', function() {
            nextBtn.disabled = !this.checked;
        });
        
        // 关闭标签页
        function closeTab() {
            console.log('关闭标签页');
            window.close();
        }
        
        // 监听 ESC 键关闭界面
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.key === 'Esc') {
                console.log('检测到 ESC 键，关闭界面');
                window.close();
            }
        });
    </script>
</body>
</html>
